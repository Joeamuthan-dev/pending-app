<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PENDING - Forgot PIN</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#22c55e",
                        "background-light": "#f8f6f5",
                        "background-dark": "#0a0a0a",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex h-full min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden max-w-md mx-auto">
<div class="flex items-center p-4 pb-2 justify-between">
<button aria-label="Go back" class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start focus:outline-none">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<div class="flex-1"></div>
<div class="size-12 flex items-center justify-end">
<span class="material-symbols-outlined text-primary text-2xl">lock_reset</span>
</div>
</div>
<div class="px-6 pt-8 pb-4">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-3xl font-bold leading-tight mb-2">Forgot PIN?</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed">
                Enter your registered email address to receive a recovery code. We'll help you get back into your account securely.
            </p>
</div>
<div class="flex flex-col gap-6 px-6 py-6">
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wider" for="email">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400">mail</span>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 h-14 pl-12 pr-4 placeholder:text-slate-400 dark:placeholder:text-slate-600 text-base font-normal transition-all" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="pt-2">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary hover:bg-primary/90 text-white text-lg font-bold leading-normal tracking-wide transition-colors shadow-lg shadow-primary/20">
<span class="truncate">Send Recovery Code</span>
</button>
</div>
</div>
<div class="mt-auto p-8 text-center">
<p class="text-slate-500 dark:text-slate-500 text-sm">
                Remember your PIN? 
                <a class="text-primary font-semibold hover:underline" href="#">Log in</a>
</p>
</div>
<div class="flex flex-col items-center justify-center gap-4 py-8 opacity-20 grayscale pointer-events-none">
<div class="h-1 w-24 bg-gradient-to-r from-transparent via-slate-500 to-transparent rounded-full"></div>
<p class="text-xs font-display tracking-[0.3em] uppercase">Pending Secure</p>
</div>
</div>
<!-- Decorative background element -->
<div class="fixed top-0 right-0 -translate-y-1/2 translate-x-1/2 w-96 h-96 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed bottom-0 left-0 translate-y-1/2 -translate-x-1/2 w-64 h-64 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
</body></html>
