<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PENDING - Add Task</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#22C55E",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121121",
                        "premium-dark": "#0D0D0D",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glow-button {
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
            transition: all 0.3s ease;
        }
        .glow-button:hover {
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.5);
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Background Mock Content -->
<header class="flex items-center justify-between px-6 py-4 border-b border-primary/10">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-black">
<span class="material-symbols-outlined text-sm font-bold">check_circle</span>
</div>
<h1 class="text-xl font-bold tracking-tight">PENDING</h1>
</div>
<button class="w-10 h-10 rounded-full flex items-center justify-center bg-primary/10 text-primary">
<span class="material-symbols-outlined font-variation-fill">person</span>
</button>
</header>
<main class="flex-1 p-6 space-y-6">
<div class="flex items-center justify-between">
<h2 class="text-2xl font-semibold">Today</h2>
<span class="text-sm font-medium text-primary bg-primary/10 px-3 py-1 rounded-full">3 Tasks</span>
</div>
<div class="space-y-3">
<div class="flex items-center gap-4 p-4 bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-primary/5">
<div class="w-6 h-6 rounded-full border-2 border-primary/30"></div>
<div>
<p class="font-medium">Review Q4 Design System</p>
<p class="text-sm text-slate-500">Design Team • 10:00 AM</p>
</div>
</div>
</div>
</main>
<!-- Modal Overlay -->
<div class="absolute inset-0 bg-black/80 backdrop-blur-md z-50 flex flex-col justify-end">
<!-- Premium Bottom Sheet -->
<div class="bg-premium-dark rounded-t-[2.5rem] shadow-2xl overflow-hidden animate-in slide-in-from-bottom duration-300 border-t border-white/5">
<!-- BottomSheetHandle -->
<div class="flex h-8 w-full items-center justify-center">
<div class="h-1.5 w-12 rounded-full bg-white/10 mt-3"></div>
</div>
<div class="p-8 space-y-8">
<div class="flex items-center justify-between">
<h2 class="text-2xl font-bold tracking-tight text-white">New Task</h2>
<button class="w-8 h-8 flex items-center justify-center rounded-full bg-white/5 text-slate-400 hover:text-white transition-colors">
<span class="material-symbols-outlined text-xl">close</span>
</button>
</div>
<div class="space-y-6">
<!-- Task Name Input -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-wider text-slate-500 ml-1" for="task-name">Task Name</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary">edit_note</span>
<input class="w-full pl-12 pr-4 h-14 bg-white/5 border-none ring-1 ring-white/10 rounded-2xl focus:ring-2 focus:ring-primary focus:bg-white/10 transition-all text-lg text-white placeholder:text-slate-600" id="task-name" placeholder="E.g. Website Rebranding" type="text"/>
</div>
</div>
<!-- Description Textarea -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-wider text-slate-500 ml-1" for="task-description">Description</label>
<textarea class="w-full p-4 bg-white/5 border-none ring-1 ring-white/10 rounded-2xl focus:ring-2 focus:ring-primary focus:bg-white/10 transition-all text-base text-white placeholder:text-slate-600 resize-none" id="task-description" placeholder="Add more details about this task..." rows="3"></textarea>
</div>
<!-- Categories/Tags -->
<div class="space-y-3">
<label class="text-xs font-bold uppercase tracking-wider text-slate-500 ml-1">Categories</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 bg-primary/10 text-primary border border-primary/20 rounded-full text-sm font-semibold transition-all hover:bg-primary/20">
                                    Professional
                                </button>
<button class="px-4 py-2 bg-white/5 text-slate-400 border border-white/5 rounded-full text-sm font-medium transition-all hover:bg-white/10 hover:text-white">
                                    Personal
                                </button>
<button class="px-4 py-2 bg-white/5 text-slate-400 border border-white/5 rounded-full text-sm font-medium transition-all hover:bg-white/10 hover:text-white">
                                    Business
                                </button>
<button class="px-4 py-2 bg-white/5 text-slate-400 border border-white/5 rounded-full text-sm font-medium transition-all hover:bg-white/10 hover:text-white">
                                    Content
                                </button>
<button class="px-4 py-2 bg-white/5 text-slate-400 border border-white/5 rounded-full text-sm font-medium transition-all hover:bg-white/10 hover:text-white">
                                    Health
                                </button>
</div>
</div>
</div>
<!-- Primary Action -->
<div class="pt-4 pb-10">
<button class="glow-button w-full h-16 bg-primary hover:bg-primary/90 text-black font-extrabold text-lg rounded-2xl flex items-center justify-center gap-2 transform active:scale-[0.98]">
<span class="material-symbols-outlined font-bold">add_task</span>
<span>Save Task</span>
</button>
</div>
</div>
</div>
</div>
<!-- Floating Add Button (Background Context) -->
<button class="absolute bottom-6 right-6 w-14 h-14 bg-primary text-black rounded-full shadow-xl flex items-center justify-center">
<span class="material-symbols-outlined text-2xl font-bold">add</span>
</button>
</div>
</body></html>
