<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Account - pending</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#22c55e",
                        "background-dark": "#0a0a0a",
                        "surface-dark": "#171717",
                        "border-dark": "#262626",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "sans": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            min-height: max(884px, 100dvh);
        }
        /* Style for PIN dots to match SCREEN_15 style */
        input[type="password"].pin-input {
            letter-spacing: 1.5rem;
            text-align: center;
            padding-left: 2rem;
        }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 antialiased overflow-x-hidden">
<!-- Main Container -->
<div class="relative flex min-h-screen w-full flex-col bg-background-dark group/design-root max-w-[480px] mx-auto overflow-hidden">
<!-- Header Section -->
<div class="flex items-center p-6 pb-2 justify-center">
<h2 class="text-slate-400 text-xs font-bold tracking-[0.3em] uppercase">pending</h2>
</div>
<!-- Hero Section - Matching Screen_15 Layout -->
<div class="relative flex-1 flex flex-col items-center justify-center px-6 py-10">
<!-- Hero Illustration/Icon Area (Replacing Tree for Registration context but keeping style) -->
<div class="relative w-full aspect-square max-h-[280px] flex items-center justify-center mb-6">
<div class="w-full h-full bg-center bg-no-repeat bg-contain relative flex items-center justify-center" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuApDnsTzIsgldHAf2QsmG3AMY2avxP1qAAYjXGcxmn93poCgYTkzjLDC84mTX4LWgH2A14VsDU66E3DJsToV_KYcSC7WgUvTAErG5BqlLdYSIcCwn3sd3kWxwDtY8zl_IZVwkLh2-RDt4qSRJin8Mfav9zLTdlqoER8N_qA0bA1LsCOmtpXvi2t1bUqSDIKHRHBPk2zhkKFMYjo6HCdJNjD6anHpXBa4NRrWLk9wTbtH3wKPGrMtyr4fqg94pFQi9FpQX-Hu6XxU8M");'>
<!-- Overlay for the 'Glowing' effect -->
<div class="absolute inset-0 bg-gradient-to-t from-background-dark/80 via-transparent to-transparent"></div>
</div>
</div>
<!-- Title Section -->
<div class="text-center mb-8">
<h1 class="text-white tracking-tight text-3xl font-semibold leading-tight">Create Account</h1>
<p class="text-slate-400 text-sm mt-2 font-light">Join the premium task management experience.</p>
</div>
<!-- Registration Form Section -->
<form class="w-full space-y-4">
<div class="space-y-4">
<!-- Full Name Field -->
<div class="flex flex-col w-full">
<label class="text-slate-400 text-xs font-semibold mb-2 ml-1">Full Name</label>
<input class="form-input w-full rounded-xl text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-slate-800 bg-slate-900/50 h-14 placeholder:text-slate-600 p-4 text-base font-normal" placeholder="e.g. Alex Rivera" type="text"/>
</div>
<!-- Email Address Field -->
<div class="flex flex-col w-full">
<label class="text-slate-400 text-xs font-semibold mb-2 ml-1">Email Address</label>
<input class="form-input w-full rounded-xl text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-slate-800 bg-slate-900/50 h-14 placeholder:text-slate-600 p-4 text-base font-normal" placeholder="your@email.com" type="email"/>
</div>
<!-- 4-Digit PIN Field (Using the single-input style from SCREEN_15) -->
<div class="flex flex-col w-full">
<label class="text-slate-400 text-xs font-semibold mb-2 ml-1">4-Digit PIN</label>
<div class="relative">
<input class="pin-input form-input w-full rounded-xl text-white focus:outline-0 focus:ring-1 focus:ring-primary border border-slate-800 bg-slate-900/50 h-14 placeholder:text-slate-600 text-2xl font-bold tracking-[1.5rem]" maxlength="4" placeholder="••••" type="password"/>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3 w-full pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold h-14 rounded-xl transition-all shadow-lg shadow-primary/20" type="submit">
                        Start Organizing
                    </button>
<div class="flex justify-center px-1 mt-2">
<a class="text-slate-400 text-sm font-medium hover:text-primary transition-colors" href="#">Already have an account? Log In</a>
</div>
</div>
</form>
</div>
<!-- Bottom Safe Area Spacer -->
<div class="h-10 w-full"></div>
</div>
</body></html>
